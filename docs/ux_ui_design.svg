<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" width="100%" height="100%">
  <!-- Visual styles and modern fonts -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      .code-font {
        font-family: 'JetBrains Mono', monospace;
      }
      .header-title { font-weight: 800; font-size: 26px; fill: #FFFFFF; }
      .header-desc { font-weight: 400; font-size: 14px; fill: #6B7280; }
      .section-heading { font-weight: 700; font-size: 18px; fill: #FFFFFF; }
      .label-title { font-weight: 600; font-size: 13px; fill: #E2E8F0; }
      .label-desc { font-weight: 400; font-size: 11px; fill: #94A3B8; }
      .btn-lbl { font-weight: 700; font-size: 13px; fill: #FFFFFF; }
      .badge-lbl { font-weight: 700; font-size: 10px; fill: #FFFFFF; }
    </style>

    <!-- Background Gradients -->
    <linearGradient id="main-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d16"/>
      <stop offset="50%" stop-color="#0b0f19"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Glassmorphic Card Fills -->
    <linearGradient id="glass-card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Primary Brand Indigo Gradient -->
    <linearGradient id="primary-btn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>

    <!-- Danger Accent Red Gradient -->
    <linearGradient id="danger-btn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>

    <!-- Accent Emerald Gradient -->
    <linearGradient id="success-badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Shadow filters for glows -->
    <filter id="glow-indigo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background Base Canvas -->
  <rect width="1600" height="1200" rx="20" fill="url(#main-bg)"/>
  <rect width="1600" height="1200" rx="20" fill="none" stroke="#1E293B" stroke-width="3"/>

  <!-- ==================== HEADER SECTION ==================== -->
  <g transform="translate(60, 50)">
    <!-- Brand Logo -->
    <rect width="48" height="48" rx="10" fill="url(#primary-btn)" filter="url(#glow-indigo)"/>
    <svg x="12" y="12" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0z" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0z" />
    </svg>
    <text x="68" y="24" class="header-title">DevLab-One Car Detector UI Mockups</text>
    <text x="68" y="44" class="header-desc">High-Fidelity Dashboard &amp; CCTV stream layouts (Importable vector layers for Figma prototyping)</text>
  </g>

  <!-- ==================== SCREEN A: DASHBOARD VIEW (LEFT OVERVIEW) ==================== -->
  <g transform="translate(60, 140)">
    <!-- Screen Header Label -->
    <rect width="690" height="40" rx="8" fill="#1E293B" opacity="0.4"/>
    <text x="20" y="25" font-weight="700" font-size="14" fill="#6366F1" text-transform="uppercase" letter-spacing="1">Interface Screen 1: Image Upload Dashboard</text>

    <!-- Shell Window Frame -->
    <rect y="60" width="690" height="920" rx="16" fill="#0F172A" stroke="#1E293B" stroke-width="2"/>
    
    <!-- Browser Top Bar Mock -->
    <circle cx="20" cy="85" r="6" fill="#EF4444"/>
    <circle cx="40" cy="85" r="6" fill="#F59E0B"/>
    <circle cx="60" cy="85" r="6" fill="#10B981"/>
    <rect x="100" y="73" width="490" height="24" rx="6" fill="#020617" stroke="#1E293B" stroke-width="1"/>
    <text x="345" y="89" text-anchor="middle" font-size="10" fill="#6B7280" class="code-font">http://localhost:4200/dashboard</text>

    <!-- Model Stats Banner inside App -->
    <g transform="translate(20, 120)">
      <rect width="650" height="50" rx="8" fill="url(#glass-card)" stroke="#334155" stroke-dasharray="2,2"/>
      <rect x="15" y="15" width="90" height="20" rx="4" fill="#4F46E5"/>
      <text x="60" y="29" text-anchor="middle" class="badge-lbl">YOLOv8: LIVE</text>

      <rect x="120" y="15" width="130" height="20" rx="4" fill="#10B981"/>
      <text x="185" y="29" text-anchor="middle" class="badge-lbl">RESNET50: VERIFIED</text>

      <rect x="265" y="15" width="95" height="20" rx="4" fill="#1E293B"/>
      <text x="312" y="29" text-anchor="middle" class="badge-lbl" fill="#94A3B8">EPOCHS: 50/50</text>
    </g>

    <!-- Image Viewport (Left half) -->
    <g transform="translate(20, 190)">
      <rect width="400" height="420" rx="12" fill="#020617" stroke="#1E293B" stroke-width="1.5"/>
      
      <!-- Mock Vector Graphic of a Car -->
      <path d="M 50 300 Q 50 250 80 230 L 150 200 Q 200 170 250 200 L 320 230 Q 350 250 350 300 Z" fill="#1E293B" stroke="#334155" stroke-width="2"/>
      <!-- Car Cabin and Glass -->
      <path d="M 120 220 L 160 205 L 240 205 L 280 220 Z" fill="#090D16" stroke="#334155" stroke-width="1.5"/>
      <!-- Wheels -->
      <circle cx="100" cy="300" r="30" fill="#090D16" stroke="#4F46E5" stroke-width="3"/>
      <circle cx="100" cy="300" r="10" fill="#334155"/>
      <circle cx="300" cy="300" r="30" fill="#090D16" stroke="#4F46E5" stroke-width="3"/>
      <circle cx="300" cy="300" r="10" fill="#334155"/>
      
      <!-- Vector grill (audi emblem region) -->
      <rect x="180" y="260" width="40" height="20" rx="4" fill="#090d16" stroke="#4F46E5" stroke-width="1"/>
      <ellipse cx="200" cy="270" rx="12" ry="6" fill="none" stroke="#FFFFFF" stroke-width="1"/>

      <!-- YOLO + Classifier Bounding Box Overlay -->
      <rect x="40" y="160" width="320" height="180" rx="6" fill="none" stroke="#10B981" stroke-width="3" filter="url(#glow-green)"/>
      <!-- Label Tag -->
      <rect x="40" y="132" width="110" height="28" rx="4" fill="#10B981"/>
      <text x="50" y="151" font-weight="800" font-size="12" fill="#FFFFFF">AUDI (98.4%)</text>
    </g>

    <!-- Upload Zone placeholder at bottom -->
    <g transform="translate(20, 630)">
      <rect width="400" height="150" rx="12" fill="#020617" stroke="#4F46E5" stroke-width="2" stroke-dasharray="6,4"/>
      <svg x="185" y="30" width="30" height="30" fill="none" stroke="#6366F1" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" />
      </svg>
      <text x="200" y="90" text-anchor="middle" class="label-title">Drag &amp; Drop vehicle photo here</text>
      <text x="200" y="110" text-anchor="middle" class="label-desc">Supports JPEG, PNG, WEBP up to 10MB</text>
      
      <rect x="135" y="125" width="130" height="30" rx="6" fill="url(#primary-btn)"/>
      <text x="200" y="144" text-anchor="middle" class="btn-lbl">Browse Files</text>
    </g>

    <!-- Right Sidebar Detections Panel -->
    <g transform="translate(440, 190)">
      <rect width="230" height="590" rx="12" fill="url(#glass-card)" stroke="#1E293B" stroke-width="1.5"/>
      <text x="15" y="30" class="section-heading">Active Detection</text>
      <text x="15" y="50" font-size="11" fill="#6B7280">1 object successfully identified</text>

      <!-- Detection Card 1 -->
      <g transform="translate(12, 75)">
        <rect width="206" height="85" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="1"/>
        <rect x="12" y="12" width="60" height="18" rx="4" fill="rgba(16, 185, 129, 0.1)" stroke="#10B981" stroke-width="0.5"/>
        <text x="42" y="24" text-anchor="middle" font-size="9" fill="#10B981" font-weight="800">CAR</text>
        <text x="12" y="48" font-size="10" fill="#94A3B8">YOLO Conf: 99.2%</text>
        
        <text x="194" y="28" text-anchor="end" font-weight="700" font-size="14" fill="#10B981">Audi</text>
        <text x="194" y="48" text-anchor="end" font-size="10" fill="#E2E8F0">ResNet: 98.4%</text>
      </g>

      <!-- Idle/Empty state text just in case -->
      <line x1="15" y1="180" x2="215" y2="180" stroke="#334155" stroke-width="1"/>
      <text x="15" y="205" font-size="10" fill="#94A3B8">Target Manufacturers:</text>
      <g transform="translate(15, 220)">
        <text x="0" y="15" font-size="9" fill="#E2E8F0">• Audi (Verified class)</text>
        <text x="0" y="30" font-size="9" fill="#E2E8F0">• BMW (Verified class)</text>
        <text x="0" y="45" font-size="9" fill="#E2E8F0">• Jeep (Verified class)</text>
        <text x="0" y="60" font-size="9" fill="#E2E8F0">• Suzuki (Verified class)</text>
        <text x="0" y="75" font-size="9" fill="#E2E8F0">• Tesla (Verified class)</text>
      </g>
    </g>

    <!-- App Navigation Footer links mock -->
    <g transform="translate(20, 890)">
      <line x1="0" y1="0" x2="650" y2="0" stroke="#1E293B" stroke-width="1"/>
      <text x="0" y="20" font-size="10" fill="#4B5563">Powered by DevLab-One AI Engine v1.0.0</text>
      <text x="650" y="20" text-anchor="end" font-size="10" fill="#6366F1">Switch to Live Camera view →</text>
    </g>
  </g>

  <!-- ==================== SCREEN B: LIVE CAMERA VIEW (RIGHT OVERVIEW) ==================== -->
  <g transform="translate(800, 140)">
    <!-- Screen Header Label -->
    <rect width="740" height="40" rx="8" fill="#1E293B" opacity="0.4"/>
    <text x="20" y="25" font-weight="700" font-size="14" fill="#10B981" text-transform="uppercase" letter-spacing="1">Interface Screen 2: Live CCTV Monitor</text>

    <!-- Shell Window Frame -->
    <rect y="60" width="740" height="920" rx="16" fill="#0F172A" stroke="#1E293B" stroke-width="2"/>
    
    <!-- Browser Top Bar Mock -->
    <circle cx="20" cy="85" r="6" fill="#EF4444"/>
    <circle cx="40" cy="85" r="6" fill="#F59E0B"/>
    <circle cx="60" cy="85" r="6" fill="#10B981"/>
    <rect x="100" y="73" width="540" height="24" rx="6" fill="#020617" stroke="#1E293B" stroke-width="1"/>
    <text x="370" y="89" text-anchor="middle" font-size="10" fill="#6B7280" class="code-font">http://localhost:4200/live-camera</text>

    <!-- Live Stream Control Bar -->
    <g transform="translate(20, 120)">
      <rect width="700" height="60" rx="8" fill="url(#glass-card)" stroke="#1E293B" stroke-width="1.5"/>
      <rect x="15" y="15" width="150" height="30" rx="6" fill="url(#danger-btn)"/>
      <text x="90" y="34" text-anchor="middle" class="btn-lbl">Stop Camera Stream</text>
      
      <!-- Glowing active indicator -->
      <circle cx="190" cy="30" r="6" fill="#EF4444" filter="url(#glow-indigo)"/>
      <text x="205" y="34" font-size="11" fill="#FFFFFF" font-weight="600">LIVE FEEDING</text>
      
      <rect x="520" y="15" width="75" height="30" rx="6" fill="#1E293B"/>
      <text x="557" y="33" text-anchor="middle" font-size="10" fill="#94A3B8" font-weight="700">FPS: 2.1</text>
      
      <rect x="605" y="15" width="80" height="30" rx="6" fill="#1E293B"/>
      <text x="645" y="33" text-anchor="middle" font-size="10" fill="#94A3B8" font-weight="700">LAT: 120ms</text>
    </g>

    <!-- Video Canvas Frame -->
    <g transform="translate(20, 200)">
      <rect width="700" height="390" rx="12" fill="#020617" stroke="#4F46E5" stroke-width="1.5"/>
      
      <!-- Video Placeholder Frame Grid (simulating video frame scanlines) -->
      <line x1="0" y1="50" x2="700" y2="50" stroke="#1E293B" stroke-opacity="0.2" stroke-width="1"/>
      <line x1="0" y1="150" x2="700" y2="150" stroke="#1E293B" stroke-opacity="0.2" stroke-width="1"/>
      <line x1="0" y1="250" x2="700" y2="250" stroke="#1E293B" stroke-opacity="0.2" stroke-width="1"/>

      <!-- Vector Shape for another car (e.g. Tesla Model 3) -->
      <path d="M 200 280 Q 200 240 230 220 L 300 190 Q 360 160 420 190 L 490 220 Q 520 240 520 280 Z" fill="#0B0F19" stroke="#4F46E5" stroke-width="2"/>
      <circle cx="260" cy="285" r="24" fill="#020617" stroke="#10B981" stroke-width="2"/>
      <circle cx="460" cy="285" r="24" fill="#020617" stroke="#10B981" stroke-width="2"/>

      <!-- Bounding Box Overlays (with warning amber glow for untested target) -->
      <rect x="180" y="150" width="360" height="150" rx="6" fill="none" stroke="#F59E0B" stroke-width="3" filter="url(#glow-indigo)"/>
      <rect x="180" y="122" width="120" height="28" rx="4" fill="#F59E0B"/>
      <text x="190" y="141" font-weight="800" font-size="12" fill="#FFFFFF">TESLA (94.8%)</text>
    </g>

    <!-- Bottom Retro Terminal scrolling console drawer -->
    <g transform="translate(20, 610)">
      <rect width="700" height="260" rx="12" fill="#020617" stroke="#334155" stroke-width="1.5"/>
      <rect width="700" height="35" rx="12" fill="#1E293B" stroke="none"/>
      <rect width="700" height="15" y="20" fill="#1E293B" stroke="none"/>
      <text x="15" y="22" class="box-title">System Event Activity Logs Console</text>
      
      <!-- Scrolling terminal logs lines -->
      <g transform="translate(15, 60)" class="code-font" font-size="11">
        <text x="0" y="15" fill="#4B5563">[06:35:50] SYSTEM: CCTV Feed request successfully mounted to canvas-ref</text>
        <text x="0" y="35" fill="#10B981">[06:36:00] DETECTED: Audi (98%) - BBOX crop padded &amp; uploaded</text>
        <text x="0" y="55" fill="#4B5563">[06:36:12] SYSTEM: Fetching /api/model/info/ configs...</text>
        <text x="0" y="75" fill="#E2E8F0">[06:36:20] API RESOLVE: version="untrained", loading fallback model parameters</text>
        <text x="0" y="95" fill="#10B981">[06:36:39] LOCAL EVENT: Checkpoint 10 resolved. Loading resnet50_epoch_10.pt</text>
        <text x="0" y="115" fill="#EF4444">[06:37:05] WARNING: Frame bounding box confidence below 0.75. Class marked unknown</text>
        <text x="0" y="135" fill="#F59E0B">[06:38:11] DETECTED: Tesla (94.8%) - Active coordinates broadcasted</text>
      </g>
    </g>

    <!-- App Navigation Footer links mock -->
    <g transform="translate(20, 890)">
      <line x1="0" y1="0" x2="700" y2="0" stroke="#1E293B" stroke-width="1"/>
      <text x="0" y="20" font-size="10" fill="#4B5563">Console Buffer: 7 lines logged</text>
      <text x="700" y="20" text-anchor="end" font-size="10" fill="#10B981">Switch to Image Upload Dashboard view</text>
    </g>
  </g>
</svg>
